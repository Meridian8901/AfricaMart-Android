<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AfricaMart</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0D1B2A; font-family: system-ui, -apple-system, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; gap: 12px; text-align: center; padding: 24px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.25); border-top-color: #E8B84B; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div>Loading AfricaMart…</div>
    <div style="font-size:13px;opacity:.6">Connect to the internet and reopen the app if this doesn't load.</div>
  </div>
</body>
</html>
